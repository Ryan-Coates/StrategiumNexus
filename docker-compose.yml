services:
  dev:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules   # keep container's node_modules isolated
    environment:
      - CHOKIDAR_USEPOLLING=true   # ensures hot-reload works on Windows/WSL
    restart: unless-stopped

  preview:
    build:
      context: .
      target: production
    ports:
      - "8088:80"
    profiles:
      - preview
    restart: unless-stopped
