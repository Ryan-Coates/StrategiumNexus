<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#05050a"/>
  <!-- Gold border -->
  <rect x="1" y="1" width="30" height="30" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <!-- Corner ornaments -->
  <rect x="1" y="1" width="4" height="4" fill="#c9a84c" opacity="0.6"/>
  <rect x="27" y="1" width="4" height="4" fill="#c9a84c" opacity="0.6"/>
  <rect x="1" y="27" width="4" height="4" fill="#c9a84c" opacity="0.6"/>
  <rect x="27" y="27" width="4" height="4" fill="#c9a84c" opacity="0.6"/>
  <!-- Stylised "S" glyph in Cinzel style -->
  <text x="16" y="22" font-family="Georgia, serif" font-size="17" font-weight="bold"
        fill="#c9a84c" text-anchor="middle" letter-spacing="0">S</text>
</svg>
