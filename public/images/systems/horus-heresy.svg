    <!-- Eight-pointed star (Chaos / Legiones symbol) -->
    <!-- Cardinal points - tall spikes -->
    <path d="M100 22 L107 88 L100 96 L93 88Z"/>
    <path d="M178 100 L112 107 L104 100 L112 93Z"/>
    <path d="M100 178 L93 112 L100 104 L107 112Z"/>
    <path d="M22 100 L88 93 L96 100 L88 107Z"/>

    <!-- Diagonal points - medium spikes -->
    <path d="M157 43 L110 90 L103 90 L106 83Z"/>
    <path d="M157 157 L110 110 L110 103 L117 106Z"/>
    <path d="M43 157 L90 110 L97 110 L94 117Z"/>
    <path d="M43 43 L90 90 L90 97 L83 94Z"/>

