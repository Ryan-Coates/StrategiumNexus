<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g fill="#c9aa71">
    <!-- Outer decorative ring -->
    <path fill-rule="evenodd" d="M100 8a92 92 0 1 1 0 184A92 92 0 0 1 100 8zm0 8a84 84 0 1 0 0 168A84 84 0 0 0 100 16z"/>

    <!-- Main targeting circle -->
    <path fill-rule="evenodd" d="M100 38a62 62 0 1 1 0 124A62 62 0 0 1 100 38zm0 6a56 56 0 1 0 0 112A56 56 0 0 0 100 44z"/>

    <!-- Crosshair lines - horizontal left -->
    <rect x="32" y="98" width="30" height="4" rx="2"/>
    <!-- Crosshair lines - horizontal right -->
    <rect x="138" y="98" width="30" height="4" rx="2"/>
    <!-- Crosshair lines - vertical top -->
    <rect x="98" y="32" width="4" height="30" rx="2"/>
    <!-- Crosshair lines - vertical bottom -->
    <rect x="98" y="138" width="4" height="30" rx="2"/>

    <!-- Corner brackets - top left -->
    <rect x="52" y="52" width="18" height="4" rx="2"/>
    <rect x="52" y="52" width="4" height="18" rx="2"/>
    <!-- Corner brackets - top right -->
    <rect x="130" y="52" width="18" height="4" rx="2"/>
    <rect x="144" y="52" width="4" height="18" rx="2"/>
    <!-- Corner brackets - bottom left -->
    <rect x="52" y="144" width="18" height="4" rx="2"/>
    <rect x="52" y="130" width="4" height="18" rx="2"/>
    <!-- Corner brackets - bottom right -->
    <rect x="130" y="144" width="18" height="4" rx="2"/>
    <rect x="144" y="130" width="4" height="18" rx="2"/>

    <!-- Inner aiming circle -->
    <path fill-rule="evenodd" d="M100 82a18 18 0 1 1 0 36A18 18 0 0 1 100 82zm0 4a14 14 0 1 0 0 28A14 14 0 0 0 100 86z"/>

    <!-- Central diamond -->
    <path d="M100 90 L108 100 L100 110 L92 100Z"/>
    <!-- Central dot -->
    <circle cx="100" cy="100" r="4"/>

    <!-- Tick marks around outer ring -->
    <rect x="99" y="17" width="2" height="8" rx="1"/>
    <rect x="99" y="175" width="2" height="8" rx="1"/>
    <rect x="17" y="99" width="8" height="2" rx="1"/>
    <rect x="175" y="99" width="8" height="2" rx="1"/>
    <rect x="148" y="37" width="2" height="8" rx="1" transform="rotate(45 149 41)"/>
    <rect x="50" y="37" width="2" height="8" rx="1" transform="rotate(-45 51 41)"/>
    <rect x="148" y="155" width="2" height="8" rx="1" transform="rotate(-45 149 159)"/>
    <rect x="50" y="155" width="2" height="8" rx="1" transform="rotate(45 51 159)"/>

    <!-- KT label suggestion - two small rectangles -->
    <rect x="86" y="154" width="10" height="3" rx="1.5"/>
    <rect x="104" y="154" width="10" height="3" rx="1.5"/>
  </g>
</svg>
